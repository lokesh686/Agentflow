version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: agentflow_dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ── API Gateway (Node.js) ───────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/agentflow_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET_PRIVATE: ${JWT_SECRET_PRIVATE:-dev-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-change-in-prod}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo
      - redis
    volumes:
      - ./apps/api-gateway/src:/app/src  # hot-reload in dev

  # ── Orchestrator (Python / LangGraph) ──────────────────────────────────────
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGODB_URI: mongodb://mongo:27017/agentflow_dev
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      MAX_AGENT_STEPS: 25
      MAX_EXECUTION_TIME_SECONDS: 300
    depends_on:
      - mongo
      - redis

  # ── Frontend (React / Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/v1
      VITE_WS_URL: http://localhost:3000
    depends_on:
      - api-gateway

volumes:
  mongo_data:
  redis_data:
