version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: agentflow_prod
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/agentflow_prod
      REDIS_URL: redis://redis:6379
      ORCHESTRATOR_URL: http://orchestrator:8001
      # IMPORTANT: Provide proper secrets via ENV
      JWT_SECRET_PRIVATE: ${JWT_SECRET_PRIVATE}
      JWT_SECRET_PUBLIC: ${JWT_SECRET_PUBLIC}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/agentflow_prod
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-/v1}
      VITE_WS_URL: ${VITE_WS_URL:-/}
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data: