replicaCount: 1

image:
  repository: ghcr.io/lokesh686/agentflow/api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

orchestrator:
  image:
    repository: ghcr.io/lokesh686/agentflow/orchestrator
    tag: "latest"
  replicaCount: 2

frontend:
  image:
    repository: ghcr.io/lokesh686/agentflow/frontend
    tag: "latest"

mongodb:
  enabled: true
  auth:
    rootPassword: "change-in-prod"

redis:
  enabled: true
  auth:
    password: "change-in-prod"

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: agentflow.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          service: frontend
        - path: /v1
          pathType: ImplementationSpecific
          service: api-gateway
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - agentflow.local
