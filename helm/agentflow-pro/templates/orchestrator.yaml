apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-orchestrator
  labels:
    app: {{ .Release.Name }}-orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-orchestrator
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          ports:
            - containerPort: 8001
          env:
            - name: MONGODB_URI
              value: "mongodb://{{ .Release.Name }}-mongodb:27017/agentflow_prod"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            - name: OPENAI_API_KEY
              value: "demo-key"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}-orchestrator
