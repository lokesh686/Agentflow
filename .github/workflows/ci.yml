name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -r services/orchestrator/requirements.txt
          pip install -r services/orchestrator/requirements-test.txt || true

      - name: Run Node Tests
        run: npm test

      - name: Run Python Tests
        run: |
          cd services/orchestrator
          python -m pytest

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api-gateway
          file: ./apps/api-gateway/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest,ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./services/orchestrator
          file: ./services/orchestrator/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/orchestrator:latest,ghcr.io/${{ github.repository }}/orchestrator:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest,ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
